name: flutter_worksmart_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  flutter_animate: ^4.5.2
  flutter_slidable: ^4.0.0
  google_fonts: ^8.0.0
  intl: ^0.20.2
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  camera: ^0.11.3
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  file_picker: ^10.3.10
  image_picker: ^1.2.1
  sqflite: ^2.4.2
  path: ^1.9.1
  shared_preferences: ^2.5.4
  flutter_launcher_icons: ^0.14.4
  firebase_core: ^4.5.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.3
  firebase_remote_config: ^6.1.0
  crypto: ^3.0.7
  http: ^1.5.0
  google_mlkit_face_detection: ^0.11.0
  tflite_flutter: ^0.11.0
  image: ^4.1.3
  detect_fake_location: ^2.3.2
  flutter_jailbreak_detection: ^1.1.0
  ntp: ^2.0.0
  device_info_plus: ^11.3.0
  flutter_local_notifications: ^17.2.3
  pdf: ^3.11.3
  path_provider: ^2.1.1
  share_plus: ^7.0.2
  dio: ^5.10.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/models/
    # - assets/animations/
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/appIcon_for_display.png"
